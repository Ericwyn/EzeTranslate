name: Build Multi-Platform Binaries

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev dpkg-dev

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -v ./...

  build-binaries:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output_name: EzeTranslate-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output_name: EzeTranslate-darwin-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            output_name: EzeTranslate-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o "${{ matrix.output_name }}" EzeTranslate.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.output_name }}

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output_name }}

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Debian packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev dpkg-dev

      - name: Download dependencies
        run: go mod download

      - name: Build deb package
        run: bash ./build-deb.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: EzeTranslate-deb-amd64
          path: build-target/deb/*/*.deb

      - name: Upload deb release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build-target/deb/*/*.deb
